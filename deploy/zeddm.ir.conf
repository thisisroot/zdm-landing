server {
    listen 80;
    listen [::]:80;
    server_name zeddm.ir www.zeddm.ir;

    root /var/www/zeddm.ir;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # JS/CSS change on every deploy — always revalidate so updates show up
    # immediately (a 304 on unchanged files is cheap; a silently stale file for
    # 30 days like the old rule below is not).
    location ~* \.(?:css|js)$ {
        add_header Cache-Control "no-cache";
    }

    # images/fonts change rarely, safe to cache hard
    location ~* \.(?:png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # contact form backend — only this exact file is routed to PHP-FPM.
    # Check your PHP-FPM socket path first: `ls /run/php/` and adjust below.
    location = /api/contact.php {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # never serve the SMTP credentials or composer internals over HTTP
    location ~ /api/\.env$ { deny all; }
    location ^~ /api/vendor/ { deny all; }
    location ^~ /api/composer\.(json|lock)$ { deny all; }

    # keep this pointed at your project's real logs if you already centralize them elsewhere
    access_log /var/log/nginx/zeddm.ir.access.log;
    error_log  /var/log/nginx/zeddm.ir.error.log;
}
