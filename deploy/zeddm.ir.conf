server {
    listen 80;
    listen [::]:80;
    server_name zeddm.ir www.zeddm.ir;

    root /var/www/zeddm.ir;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(?:css|js|png|jpg|jpeg|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # keep this pointed at your project's real logs if you already centralize them elsewhere
    access_log /var/log/nginx/zeddm.ir.access.log;
    error_log  /var/log/nginx/zeddm.ir.error.log;
}
